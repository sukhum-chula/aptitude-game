<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logic Labyrinth — BrainArena</title>
<link rel="stylesheet" href="../assets/css/theme.css" />
<style>
  .game-stage { padding: 8px 24px 40px; align-items: flex-start; }

  .lab-shell {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* HUD */
  .hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .hud-cell {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 10px 8px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .hud-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 4px;
  }
  .hud-value {
    font-size: 18px;
    font-weight: 700;
  }

  /* Progress bar */
  .progress-track {
    height: 6px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #a78bfa, #7c3aed);
    transition: width 0.4s ease;
  }

  /* Statement card */
  .statement-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 28px 24px;
    text-align: center;
    backdrop-filter: blur(10px);
    min-height: 150px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;
  }
  .statement-prompt {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .statement {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }
  .streak-bubble {
    font-size: 12px;
    color: #fbbf24;
    font-weight: 600;
  }
  .streak-bubble.hidden { display: none; }

  /* Doors */
  .doors {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .door {
    background: var(--card);
    border: 2px solid var(--card-border);
    border-radius: 18px;
    padding: 28px 16px;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s, background 0.2s;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    backdrop-filter: blur(10px);
    font-family: inherit;
  }
  .door:hover:not(:disabled) { transform: translateY(-4px); }
  .door-true { border-color: rgba(74, 222, 128, 0.3); }
  .door-true:hover:not(:disabled) {
    border-color: #4ade80;
    box-shadow: 0 8px 24px rgba(74, 222, 128, 0.25);
  }
  .door-false { border-color: rgba(248, 113, 113, 0.3); }
  .door-false:hover:not(:disabled) {
    border-color: #f87171;
    box-shadow: 0 8px 24px rgba(248, 113, 113, 0.25);
  }
  .door-icon { font-size: 36px; }
  .door-label { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
  .door-shortcut {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .door:disabled { cursor: not-allowed; }
  .door.correct {
    border-color: #4ade80;
    background: rgba(74, 222, 128, 0.18);
    animation: pulseGreen 0.6s;
  }
  .door.wrong {
    border-color: #f87171;
    background: rgba(248, 113, 113, 0.18);
    animation: shake 0.5s;
  }
  @keyframes pulseGreen {
    0%   { box-shadow: 0 0 0 0   rgba(74, 222, 128, 0.5); }
    100% { box-shadow: 0 0 0 22px rgba(74, 222, 128, 0); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%      { transform: translateX(-8px); }
    75%      { transform: translateX(8px); }
  }

  .feedback {
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    min-height: 22px;
  }
  .feedback.show-correct { color: #4ade80; }
  .feedback.show-wrong   { color: #f87171; }

  /* End-of-run modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal.show { opacity: 1; pointer-events: auto; }
  .modal-card {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.18), rgba(139, 92, 246, 0.12)), var(--bg-2);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 36px 28px;
    max-width: 460px;
    width: 100%;
    text-align: center;
  }
  .modal-card h2 { font-size: 26px; margin-bottom: 6px; }
  .modal-card .subtitle { color: var(--muted); margin-bottom: 22px; font-size: 14px; }
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat-tile {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px;
  }
  .stat-tile .label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .stat-tile .value { font-size: 22px; font-weight: 700; }
  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white;
    border: none;
    padding: 11px 26px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    transition: transform 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--card-border);
    padding: 11px 26px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    background: rgba(99, 102, 241, 0.08);
  }

  @media (max-width: 540px) {
    .hud { grid-template-columns: repeat(2, 1fr); }
    .statement { font-size: 21px; }
    .door { padding: 22px 12px; }
    .door-icon { font-size: 30px; }
  }
</style>
</head>
<body data-color="purple">
  <div class="bg-decoration one"></div>
  <div class="bg-decoration two"></div>

  <header class="page-header">
    <a href="../index.html" class="logo">
      <div class="logo-icon">🧠</div>
      <span>BrainArena</span>
    </a>
    <a href="../index.html" class="back-link">← Back to Hub</a>
  </header>

  <main class="game-stage">
    <div class="lab-shell">
      <div class="hud">
        <div class="hud-cell">
          <div class="hud-label">Round</div>
          <div class="hud-value"><span id="round-num">1</span>/<span id="round-total">10</span></div>
        </div>
        <div class="hud-cell">
          <div class="hud-label">Lives</div>
          <div class="hud-value" id="lives">❤️❤️❤️</div>
        </div>
        <div class="hud-cell">
          <div class="hud-label">Score</div>
          <div class="hud-value" id="score">0</div>
        </div>
        <div class="hud-cell">
          <div class="hud-label">Time</div>
          <div class="hud-value" id="timer">0:00</div>
        </div>
      </div>

      <div class="progress-track"><div class="progress-fill" id="progress"></div></div>

      <div class="statement-card">
        <div class="statement-prompt">Is this true or false?</div>
        <div class="statement" id="statement">Loading…</div>
        <div class="streak-bubble hidden" id="streak"></div>
      </div>

      <div class="doors">
        <button class="door door-true" id="door-true" type="button">
          <div class="door-icon">✅</div>
          <div class="door-label">TRUE</div>
          <div class="door-shortcut">key: T or ←</div>
        </button>
        <button class="door door-false" id="door-false" type="button">
          <div class="door-icon">❌</div>
          <div class="door-label">FALSE</div>
          <div class="door-shortcut">key: F or →</div>
        </button>
      </div>

      <div class="feedback" id="feedback">Pick the door that matches the statement.</div>
    </div>

    <div class="modal" id="game-over">
      <div class="modal-card">
        <h2 id="modal-title">You escaped the labyrinth!</h2>
        <div class="subtitle" id="modal-subtitle">Here's how you did.</div>
        <div class="stat-grid">
          <div class="stat-tile"><div class="label">Final Score</div><div class="value" id="final-score">0</div></div>
          <div class="stat-tile"><div class="label">Accuracy</div><div class="value" id="final-accuracy">0%</div></div>
          <div class="stat-tile"><div class="label">Best Streak</div><div class="value" id="final-streak">0</div></div>
          <div class="stat-tile"><div class="label">Time</div><div class="value" id="final-time">0:00</div></div>
        </div>
        <div class="modal-actions">
          <button class="btn-primary" id="play-again" type="button">Play Again</button>
          <a class="btn-secondary" href="../index.html">Back to Hub</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    const STATEMENTS = [
      { text: "12 + 8 = 20", truth: true },
      { text: "9 × 7 = 64", truth: false },
      { text: "100 ÷ 4 = 25", truth: true },
      { text: "15 − 9 = 7", truth: false },
      { text: "6² = 36", truth: true },
      { text: "√81 = 9", truth: true },
      { text: "7 + 6 × 2 = 26", truth: false },
      { text: "(3 + 5) × 2 = 16", truth: true },
      { text: "11 × 11 = 122", truth: false },
      { text: "144 ÷ 12 = 12", truth: true },
      { text: "2³ + 3² = 17", truth: true },
      { text: "50% of 80 = 50", truth: false },
      { text: "17 > 15", truth: true },
      { text: "23 < 19", truth: false },
      { text: "0.5 = 1/2", truth: true },
      { text: "3/4 > 0.7", truth: true },
      { text: "−5 > −2", truth: false },
      { text: "7 is a prime number", truth: true },
      { text: "9 is a prime number", truth: false },
      { text: "1 is a prime number", truth: false },
      { text: "Zero is even", truth: true },
      { text: "12 is a multiple of 4", truth: true },
      { text: "21 is a multiple of 7", truth: true },
      { text: "All multiples of 3 are odd", truth: false },
      { text: "(true AND false) is true", truth: false },
      { text: "(true OR false) is true", truth: true },
      { text: "NOT(NOT(true)) is true", truth: true },
      { text: "A square has 4 right angles", truth: true },
      { text: "A triangle has 4 sides", truth: false },
      { text: "Angles in a triangle sum to 180°", truth: true },
      { text: "A circle has 360 degrees", truth: true },
      { text: "All rectangles are squares", truth: false },
      { text: "All squares are rectangles", truth: true },
      { text: "Next after 1, 4, 9, 16 is 25", truth: true },
      { text: "Next after 2, 4, 8, 16 is 32", truth: true },
      { text: "Next after 1, 1, 2, 3, 5 is 7", truth: false },
      { text: "Every prime > 2 is odd", truth: true },
      { text: "0 is a positive number", truth: false },
    ];

    const TOTAL_ROUNDS = 10;
    const HEART = "❤️";

    const state = {
      rounds: [],
      idx: 0,
      lives: 3,
      score: 0,
      streak: 0,
      bestStreak: 0,
      correct: 0,
      startedAt: 0,
      finished: false,
      lockedInput: false,
    };

    const els = {
      roundNum: document.getElementById("round-num"),
      roundTotal: document.getElementById("round-total"),
      lives: document.getElementById("lives"),
      score: document.getElementById("score"),
      timer: document.getElementById("timer"),
      progress: document.getElementById("progress"),
      statement: document.getElementById("statement"),
      streak: document.getElementById("streak"),
      doorTrue: document.getElementById("door-true"),
      doorFalse: document.getElementById("door-false"),
      feedback: document.getElementById("feedback"),
      modal: document.getElementById("game-over"),
      modalTitle: document.getElementById("modal-title"),
      modalSubtitle: document.getElementById("modal-subtitle"),
      finalScore: document.getElementById("final-score"),
      finalAccuracy: document.getElementById("final-accuracy"),
      finalStreak: document.getElementById("final-streak"),
      finalTime: document.getElementById("final-time"),
      playAgain: document.getElementById("play-again"),
    };

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function fmtTime(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
    }

    function startGame() {
      state.rounds = shuffle(STATEMENTS).slice(0, TOTAL_ROUNDS);
      state.idx = 0;
      state.lives = 3;
      state.score = 0;
      state.streak = 0;
      state.bestStreak = 0;
      state.correct = 0;
      state.startedAt = performance.now();
      state.finished = false;
      state.lockedInput = false;

      els.roundTotal.textContent = TOTAL_ROUNDS;
      els.modal.classList.remove("show");
      renderHUD();
      renderRound();
      tickTimer();
    }

    function tickTimer() {
      if (state.finished) return;
      els.timer.textContent = fmtTime(performance.now() - state.startedAt);
      requestAnimationFrame(tickTimer);
    }

    function renderHUD() {
      els.roundNum.textContent = Math.min(state.idx + 1, TOTAL_ROUNDS);
      els.score.textContent = state.score;
      els.lives.textContent = state.lives > 0 ? HEART.repeat(state.lives) : "—";
      els.progress.style.width = `${(state.idx / TOTAL_ROUNDS) * 100}%`;
      if (state.streak >= 2) {
        els.streak.classList.remove("hidden");
        els.streak.textContent = `🔥 ${state.streak}-streak — bonus active`;
      } else {
        els.streak.classList.add("hidden");
      }
    }

    function renderRound() {
      const round = state.rounds[state.idx];
      els.statement.textContent = round.text;
      els.feedback.textContent = "Pick the door that matches the statement.";
      els.feedback.className = "feedback";
      els.doorTrue.classList.remove("correct", "wrong");
      els.doorFalse.classList.remove("correct", "wrong");
      els.doorTrue.disabled = false;
      els.doorFalse.disabled = false;
      state.lockedInput = false;
    }

    function answer(picked) {
      if (state.lockedInput || state.finished) return;
      state.lockedInput = true;
      els.doorTrue.disabled = true;
      els.doorFalse.disabled = true;
      const round = state.rounds[state.idx];
      const correct = picked === round.truth;
      const pickedEl = picked ? els.doorTrue : els.doorFalse;
      const truthEl = round.truth ? els.doorTrue : els.doorFalse;

      if (correct) {
        state.correct += 1;
        state.streak += 1;
        state.bestStreak = Math.max(state.bestStreak, state.streak);
        const points = 100 + Math.min(state.streak - 1, 9) * 25;
        state.score += points;
        pickedEl.classList.add("correct");
        els.feedback.textContent = `+${points} — you push deeper into the labyrinth.`;
        els.feedback.className = "feedback show-correct";
      } else {
        state.streak = 0;
        state.lives -= 1;
        pickedEl.classList.add("wrong");
        truthEl.classList.add("correct");
        els.feedback.textContent = `Wrong — the answer was ${round.truth ? "TRUE" : "FALSE"}.`;
        els.feedback.className = "feedback show-wrong";
      }
      renderHUD();

      setTimeout(() => {
        state.idx += 1;
        if (state.lives <= 0 || state.idx >= TOTAL_ROUNDS) {
          finish();
        } else {
          renderRound();
          renderHUD();
        }
      }, 1100);
    }

    function finish() {
      state.finished = true;
      const elapsed = performance.now() - state.startedAt;
      const accuracy = Math.round((state.correct / TOTAL_ROUNDS) * 100);
      const escaped = state.lives > 0 && state.idx >= TOTAL_ROUNDS;
      const timeBonus = escaped ? Math.max(0, Math.floor(60 - elapsed / 1000)) * 10 : 0;
      state.score += timeBonus;

      els.modalTitle.textContent = escaped ? "You escaped the labyrinth!" : "Lost in the labyrinth";
      els.modalSubtitle.textContent = escaped
        ? (timeBonus > 0 ? `Time bonus: +${timeBonus}` : "Solid run.")
        : "Try again — every prime is just a stepping stone.";
      els.finalScore.textContent = state.score;
      els.finalAccuracy.textContent = `${accuracy}%`;
      els.finalStreak.textContent = state.bestStreak;
      els.finalTime.textContent = fmtTime(elapsed);
      els.modal.classList.add("show");
    }

    els.doorTrue.addEventListener("click", () => answer(true));
    els.doorFalse.addEventListener("click", () => answer(false));
    els.playAgain.addEventListener("click", startGame);

    document.addEventListener("keydown", (e) => {
      if (state.finished) return;
      if (e.key === "t" || e.key === "T" || e.key === "ArrowLeft")  answer(true);
      if (e.key === "f" || e.key === "F" || e.key === "ArrowRight") answer(false);
    });

    startGame();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase-client.js"></script>
</body>
</html>
